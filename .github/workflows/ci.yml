name: CI - Build & Push

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'helm/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: chayalyes/mini-platform-app

jobs:
  # === Job 1 : Lint Helm ===
  lint-helm:
    name: Lint Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint helm/

  # === Job 2 : Build + Scan + Push ===
  build-and-push:
    name: Build, scan & push image
    runs-on: ubuntu-latest
    needs: lint-helm
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build image (load locally for scan)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          load: true

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: '0'
          severity: 'HIGH,CRITICAL'

      - name: Push image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # === Job 3 : Update GitOps repo with new image tag ===
  update-gitops:
    name: Update gitops repo
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: ChayaLyes/mini-platform-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update image tag in values.yaml
        run: |
          cd gitops
          NEW_TAG=${{ needs.build-and-push.outputs.image-tag }}
          echo Updating tag to $NEW_TAG
          if [ -f apps/mini-platform-app/values.yaml ]; then
            sed -i s|tag: ".*"|tag: "$NEW_TAG"| apps/mini-platform-app/values.yaml
          else
            echo values.yaml not found yet (gitops repo not bootstrapped) — skipping
            exit 0
          fi

      - name: Commit & push
        run: |
          cd gitops
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet || git commit -m ci: bump mini-platform-app to ${{ needs.build-and-push.outputs.image-tag }}
          git push
